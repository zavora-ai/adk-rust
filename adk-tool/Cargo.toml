[package]
name = "adk-tool"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
description = "Tool system for Rust Agent Development Kit (ADK-Rust) agents (FunctionTool, MCP, Google Search)"
repository = "https://github.com/zavora-ai/adk-rust"
documentation = "https://docs.rs/adk-tool"
keywords = ["ai", "agent", "adk", "tools", "mcp"]
categories = ["api-bindings", "asynchronous"]
readme = "README.md"

[features]
default = []
# Enable memory tools (LoadMemoryTool, PreloadMemoryTool)
memory-tools = ["dep:adk-memory", "dep:chrono"]
# Enable knowledge-graph memory curation tools (RememberTool, RelateTool, GraphMemoryToolset)
graph-memory-tools = ["memory-tools", "adk-memory/graph-memory"]
# Enable Model Context Protocol clients and local child-process transport.
mcp = ["dep:rmcp"]
# Enable HTTP transport for remote MCP servers (streamable HTTP)
http-transport = [
    "mcp",
    "rmcp/transport-streamable-http-client-reqwest",
    "reqwest",
    "dep:reqwest-mcp",
]
# Enable code execution tools (CodeTool, etc.)
code = ["dep:adk-code", "dep:adk-sandbox"]
# Enable embedded JavaScript execution (requires boa_engine)
code-embedded-js = ["code", "adk-code/embedded-js"]
# Enable Docker SDK-based persistent container execution
code-docker = ["code", "adk-code/docker"]
# Enable native Slack toolset (send messages, read channels, reactions, threads)
slack = ["reqwest"]
# Enable native BigQuery toolset (execute SQL, schemas, datasets)
bigquery = ["dep:gcp-bigquery-client"]
# Enable native Spanner toolset (execute SQL, schemas, tables)
spanner = ["dep:google-cloud-spanner"]
# Enable MCP sampling callback support (sampling/createMessage handling)
mcp-sampling = ["mcp"]

[dependencies]
adk-core.workspace = true
adk-rust-macros.workspace = true
adk-telemetry.workspace = true
async-trait.workspace = true
tokio = { workspace = true, features = ["fs", "process", "sync", "time"] }
serde.workspace = true
serde_json.workspace = true
schemars = "1.0"
rmcp = { version = "2.2", features = ["client", "transport-child-process", "elicitation"], optional = true }
tracing.workspace = true
base64 = "0.22"
uuid.workspace = true
futures.workspace = true
tokio-util = { version = "0.7", features = ["rt"] }
# Optional: memory tools
adk-memory = { workspace = true, optional = true }
chrono = { workspace = true, optional = true }
# Optional: code execution substrate
adk-code = { workspace = true, optional = true }
adk-sandbox = { workspace = true, optional = true }
# Optional: HTTP client for remote MCP servers and Slack toolset
reqwest = { workspace = true, optional = true }
# rmcp 2.x uses reqwest 0.13 for its Streamable HTTP transport. Keep this
# transport-specific client separate from the workspace's provider-facing
# reqwest version until the wider workspace migration is complete.
reqwest-mcp = { package = "reqwest", version = "0.13", default-features = false, features = ["rustls", "json"], optional = true }
# Optional: BigQuery toolset
gcp-bigquery-client = { version = "0.28", optional = true }
# Optional: Spanner toolset
google-cloud-spanner = { version = "0.33", optional = true }

[dev-dependencies]
# Internal dev-deps are path-only (no version) so cargo strips them from the
# published manifest — they can never block or reorder a crates.io publish.
async-stream.workspace = true
proptest = "1.5"
tokio = { workspace = true, features = ["test-util", "macros", "rt-multi-thread"] }
adk-code = { path = "../adk-code" }
adk-sandbox = { path = "../adk-sandbox" }

[[test]]
name = "mcp_server_lifecycle_integration_tests"
required-features = ["mcp"]

[[test]]
name = "mcp_roundtrip_property_tests"
required-features = ["mcp"]
