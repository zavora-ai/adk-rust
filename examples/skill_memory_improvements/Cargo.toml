[package]
name = "skill-memory-improvements-example"
version = "0.0.1"
edition = "2024"
publish = false

[workspace]

[[bin]]
name = "validate"
path = "src/main.rs"

[dependencies]
adk-core = { path = "../../adk-core" }
adk-memory = { path = "../../adk-memory" }
adk-skill = { path = "../../adk-skill" }
adk-runner = { path = "../../adk-runner" }
adk-session = { path = "../../adk-session" }
adk-artifact = { path = "../../adk-artifact" }
adk-agent = { path = "../../adk-agent" }
adk-model = { path = "../../adk-model", features = ["gemini"] }
adk-plugin = { path = "../../adk-plugin" }
async-trait = "0.1"
async-stream = "0.3"
chrono = "0.4"
tokio = { version = "1.40", features = ["full"] }
serde_json = "1.0"
futures = "0.3"
tempfile = "3"
