[package]
name = "intra-compaction-example"
version = "0.0.1"
edition = "2024"
publish = false

[workspace]

[dependencies]
# ADK crates (path deps to workspace)
adk-runner = { path = "../../adk-runner" }
adk-core = { path = "../../adk-core" }
adk-agent = { path = "../../adk-agent" }
adk-model = { path = "../../adk-model", features = ["gemini"] }
adk-session = { path = "../../adk-session" }

# Common dependencies
tokio = { version = "1.40", features = ["full"] }
anyhow = "1.0"
dotenvy = "0.15"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
futures = "0.3"
