[package]
name = "adk-examples"
version.workspace = true
edition.workspace = true
publish = false

# Essential examples demonstrating core framework capabilities.
# For the full collection (150+ examples), see: https://github.com/zavora-ai/adk-playground

[[example]]
name = "quickstart"
path = "quickstart/main.rs"

[[example]]
name = "function_tool"
path = "function_tool/main.rs"

[[example]]
name = "sequential"
path = "sequential/main.rs"

[[example]]
name = "graph_workflow"
path = "graph_workflow/main.rs"

[[example]]
name = "mcp"
path = "mcp/main.rs"

[[example]]
name = "eval_basic"
path = "eval_basic/main.rs"

[[example]]
name = "template"
path = "template/main.rs"

[features]
default = []

[dependencies]
adk-core.workspace = true
adk-agent.workspace = true
adk-model = { workspace = true, features = ["gemini"] }
adk-gemini.workspace = true
adk-tool.workspace = true
adk-runner.workspace = true
adk-session.workspace = true
adk-graph.workspace = true
adk-eval.workspace = true
tokio.workspace = true
anyhow.workspace = true
futures.workspace = true
serde.workspace = true
serde_json.workspace = true
schemars = "0.8"
tracing.workspace = true
tracing-subscriber.workspace = true
dotenvy = "0.15"
rmcp = { version = "0.15", features = ["client", "transport-child-process"] }
