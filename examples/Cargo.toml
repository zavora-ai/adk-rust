[package]
name = "adk-examples"
version.workspace = true
edition.workspace = true
publish = false

# === Essential examples — one per core framework capability ===

[[example]]
name = "quickstart"
path = "quickstart/main.rs"

[[example]]
name = "function_tool"
path = "function_tool/main.rs"

[[example]]
name = "sequential"
path = "sequential/main.rs"

[[example]]
name = "graph_workflow"
path = "graph_workflow/main.rs"

[[example]]
name = "mcp"
path = "mcp/main.rs"

[[example]]
name = "eval_basic"
path = "eval_basic/main.rs"

[[example]]
name = "template"
path = "template/main.rs"

[[example]]
name = "openai_basic"
path = "openai_basic/main.rs"

[[example]]
name = "rag_gemini"
path = "rag_gemini/main.rs"

[[example]]
name = "vision_test"
path = "vision_test/main.rs"

# Note: ralph is a standalone crate at examples/ralph/
# Run with: cargo run -p ralph
# Test with: cargo test -p ralph

# Note: Full example collection is in the adk-playground repo:
# https://github.com/zavora-ai/adk-playground

[features]
default = []
# Enable all vision-capable providers for the vision_test example
rag-gemini = ["adk-rag/gemini"]
vision-test = ["openai", "anthropic", "bedrock"]
openai = ["adk-model/openai"]
anthropic = ["adk-model/anthropic"]
bedrock = ["adk-model/bedrock"]

[dependencies]
adk-core.workspace = true
adk-agent.workspace = true
adk-model = { workspace = true, features = ["gemini"] }
adk-gemini.workspace = true
adk-tool.workspace = true
adk-runner.workspace = true
adk-session.workspace = true
adk-memory.workspace = true
adk-graph.workspace = true
adk-eval.workspace = true
adk-rag = { workspace = true, optional = true }
adk-cli.workspace = true
tokio = { workspace = true, features = ["full"] }
anyhow.workspace = true
futures.workspace = true
serde.workspace = true
serde_json.workspace = true
schemars = "0.8"
tracing.workspace = true
tracing-subscriber.workspace = true
async-trait.workspace = true
dotenvy = "0.15"
miniz_oxide = "0.8"
rmcp = { version = "0.17", features = ["client", "transport-child-process"] }

[dev-dependencies]
proptest = "1.0"
tokio-test = "0.4"
