[package]
name = "ollama-qwen-example"
version = "0.0.1"
edition = "2024"
publish = false

[workspace]

[dependencies]
adk-core = { path = "../../adk-core" }
adk-rust = { path = "../../adk-rust", features = ["standard"] }
adk-model = { path = "../../adk-model", features = ["ollama", "openai"] }
adk-tool = { path = "../../adk-tool" }
tokio = { version = "1.40", features = ["full"] }
futures = "0.3"
serde_json = "1.0"
schemars = "0.8"
serde = { version = "1.0", features = ["derive"] }
anyhow = "1.0"
