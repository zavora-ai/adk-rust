[package]
name = "codeact-monty-agent-example"
version = "0.0.1"
edition = "2024"
publish = false
description = "Runs the ADK-Rust CodeActAgent against a real Python interpreter via the Monty-backed CodeRuntime"

# Standalone example crate with its own workspace, like the other examples. It
# depends (transitively, through adk-codeact-monty) on `monty` via git, which
# also requires rustc 1.95+ — see rust-toolchain.toml.
[workspace]

[dependencies]
adk-core = { path = "../../adk-core" }
adk-agent = { path = "../../adk-agent", features = ["codeact"] }
adk-runner = { path = "../../adk-runner" }
adk-session = { path = "../../adk-session" }
adk-codeact-monty = { path = "../../adk-codeact-monty" }
tokio = { version = "1.40", features = ["full"] }
serde_json = "1.0"
futures = "0.3"
anyhow = "1.0"
async-trait = "0.1"
dotenvy = "0.15"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
