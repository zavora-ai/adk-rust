[package]
name = "mcp-manager-example"
version = "0.0.1"
edition = "2024"
publish = false

[workspace]

[dependencies]
adk-core = { path = "../../adk-core" }
adk-tool = { path = "../../adk-tool", features = ["mcp"] }
anyhow = "1.0"
rmcp = { version = "2.2", features = ["transport-io", "schemars"] }
serde = { version = "1.0", features = ["derive"] }
tokio = { version = "1.40", features = ["full"] }
serde_json = "1.0"
