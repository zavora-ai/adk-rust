[package]
name = "eval-showcase"
version = "0.1.0"
edition = "2024"
publish = false

[workspace]

[dependencies]
adk-eval = { path = "../../adk-eval", features = ["embedding", "ci-helpers", "statistics"] }
adk-core = { path = "../../adk-core" }
adk-memory = { path = "../../adk-memory", features = ["embedding-trait"] }
async-trait = "0.1"
chrono = "0.4"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
serde_json = "1"
tempfile = "3"
