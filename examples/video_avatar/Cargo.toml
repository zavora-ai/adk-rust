[package]
name = "video-avatar-example"
version = "0.0.1"
edition = "2024"
publish = false

[workspace]

[dependencies]
# ADK crates (path deps to workspace)
adk-realtime = { path = "../../adk-realtime", features = ["video-avatar"] }
adk-core = { path = "../../adk-core" }

# Common dependencies
tokio = { version = "1.40", features = ["full"] }
anyhow = "1.0"
dotenvy = "0.15"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
