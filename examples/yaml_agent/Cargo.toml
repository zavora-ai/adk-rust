[package]
name = "yaml-agent-example"
version = "0.0.1"
edition = "2024"
publish = false

[workspace]

[dependencies]
# ADK crates (path deps to workspace)
adk-server = { path = "../../adk-server", features = ["yaml-agent"] }
adk-core = { path = "../../adk-core" }
adk-tool = { path = "../../adk-tool" }
adk-model = { path = "../../adk-model", features = ["gemini"] }

# Common dependencies
tokio = { version = "1.40", features = ["full"] }
anyhow = "1.0"
dotenvy = "0.15"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
tempfile = "3"
