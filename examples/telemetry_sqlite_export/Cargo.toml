[package]
name = "telemetry-sqlite-export-example"
version = "0.0.1"
edition = "2024"
publish = false

[workspace]

[[bin]]
name = "telemetry-sqlite-export"
path = "src/main.rs"

[dependencies]
adk-core = { path = "../../adk-core" }
adk-agent = { path = "../../adk-agent" }
adk-model = { path = "../../adk-model", features = ["gemini"] }
adk-runner = { path = "../../adk-runner" }
adk-session = { path = "../../adk-session" }
adk-telemetry = { path = "../../adk-telemetry", features = ["sqlite"] }
adk-tool = { path = "../../adk-tool" }
tokio = { version = "1.40", features = ["full"] }
futures = "0.3"
serde_json = "1.0"
dotenvy = "0.15"
anyhow = "1.0"
schemars = "1"
serde = { version = "1", features = ["derive"] }
