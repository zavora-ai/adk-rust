[package]
name = "realtime-voice-example"
version = "0.0.1"
edition = "2024"
publish = false
description = "Demonstrates ADK-Rust realtime voice capabilities with a full web UI: mindfulness coaching, memory insights, and voice session management"

[workspace]

[dependencies]
# ADK crates (path deps to workspace)
adk-realtime = { path = "../../adk-realtime", features = ["openai", "gemini", "integration"] }
adk-core = { path = "../../adk-core" }
adk-session = { path = "../../adk-session" }
adk-memory = { path = "../../adk-memory", features = ["graph-memory"] }
adk-tool = { path = "../../adk-tool", features = ["graph-memory-tools"] }

# Async runtime
tokio = { version = "1.40", features = ["full"] }

# Web server
axum = { version = "0.8", features = ["macros", "ws"] }
tower-http = { version = "0.6", features = ["cors", "trace"] }

# Error handling
anyhow = "1.0"

# Environment
dotenvy = "0.15"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# TLS
rustls = { version = "0.23", features = ["aws-lc-rs"] }

# Base64 encoding for audio
base64 = "0.22"

# Time
chrono = "0.4"

# UUID
uuid = { version = "1.23", features = ["v4"] }

# Sync primitives
futures = "0.3"
