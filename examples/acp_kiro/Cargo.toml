[package]
name = "acp-kiro-example"
version = "0.1.0"
edition = "2024"
publish = false

[workspace]

[dependencies]
adk-rust = { path = "../../adk-rust" }
adk-acp = { path = "../../adk-acp" }
tokio = { version = "1.40", features = ["full"] }
anyhow = "1.0"
dotenvy = "0.15"
serde_json = "1.0"

[[bin]]
name = "acp-kiro-delegate"
path = "src/delegate.rs"

[[bin]]
name = "acp-kiro-direct"
path = "src/direct.rs"
