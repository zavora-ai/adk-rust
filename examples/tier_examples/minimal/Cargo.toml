[package]
name = "tier-minimal"
version = "0.0.1"
edition = "2024"
publish = false

[workspace]

# Default features only — no explicit tier. This is what README users get.
[dependencies]
adk-rust = { path = "../../../adk-rust" }
adk-tool = { path = "../../../adk-tool" }
tokio = { version = "1.40", features = ["full"] }
anyhow = "1.0"
dotenvy = "0.15"
futures = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
schemars = "1"

[[bin]]
name = "01-minimal-hello"
path = "../src/01_minimal_hello.rs"

[[bin]]
name = "02-minimal-launcher"
path = "../src/02_minimal_launcher.rs"

[[bin]]
name = "03-minimal-openai"
path = "../src/03_minimal_openai.rs"

[[bin]]
name = "04-minimal-anthropic"
path = "../src/04_minimal_anthropic.rs"

[[bin]]
name = "05-minimal-tools"
path = "../src/05_minimal_tools.rs"

[[bin]]
name = "06-minimal-multi-provider"
path = "../src/06_minimal_multi_provider.rs"

[[bin]]
name = "07-minimal-memory"
path = "../src/07_minimal_memory.rs"

[[bin]]
name = "08-quickstart-scaffold"
path = "../src/08_quickstart_scaffold.rs"

[[bin]]
name = "09-quickstart-tools"
path = "../src/09_quickstart_tools.rs"

[[bin]]
name = "10-quickstart-zero-config"
path = "../src/10_quickstart_zero_config.rs"
