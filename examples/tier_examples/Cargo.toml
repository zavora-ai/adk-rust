[package]
name = "tier-examples"
version = "0.0.1"
edition = "2024"
publish = false

[workspace]

# Default (minimal) — no features specified, just like the README says
[dependencies]
adk-rust = { path = "../../adk-rust" }
adk-tool = { path = "../../adk-tool" }
tokio = { version = "1.40", features = ["full"] }
anyhow = "1.0"
dotenvy = "0.15"
futures = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
schemars = "1"

[[bin]]
name = "01-minimal-hello"
path = "src/01_minimal_hello.rs"

[[bin]]
name = "02-minimal-launcher"
path = "src/02_minimal_launcher.rs"

[[bin]]
name = "04-minimal-multi-provider"
path = "src/04_minimal_multi_provider.rs"

[[bin]]
name = "05-minimal-memory"
path = "src/05_minimal_memory.rs"
