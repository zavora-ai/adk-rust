[package]
name = "mcp-resources-example"
version = "0.0.1"
edition = "2024"
publish = false

[workspace]

[[bin]]
name = "resources-server"
path = "src/server.rs"

[[bin]]
name = "resources-client"
path = "src/client.rs"

[dependencies]
adk-core = { path = "../../adk-core" }
adk-rust = { path = "../../adk-rust", features = ["standard"] }
adk-tool = { path = "../../adk-tool", features = ["mcp"] }
adk-cli = { path = "../../adk-cli" }
rmcp = { version = "2.2", features = [
    "server", "client",
    "transport-io", "transport-child-process",
    "macros", "schemars",
] }
tokio = { version = "1.40", features = ["full"] }
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
schemars = "1.0"
anyhow = "1.0"
dotenvy = "0.15"
futures = "0.3"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
