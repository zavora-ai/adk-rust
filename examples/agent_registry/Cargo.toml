[package]
name = "agent-registry-example"
version = "0.0.1"
edition = "2024"
publish = false

[workspace]

[dependencies]
# ADK crates (path deps to workspace)
adk-server = { path = "../../adk-server", features = ["agent-registry"] }
adk-core = { path = "../../adk-core" }

# HTTP client for calling the registry REST API
reqwest = { version = "0.12", features = ["json"] }

# Axum for hosting the registry server in-process
axum = "0.8"

# Common dependencies
tokio = { version = "1.40", features = ["full"] }
anyhow = "1.0"
dotenvy = "0.15"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
