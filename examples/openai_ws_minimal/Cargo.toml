[package]
name = "openai-ws-minimal"
version = "0.0.1"
edition = "2024"
publish = false

[workspace]

[dependencies]
adk-rust = { path = "../../adk-rust", features = ["openai"] }
adk-model = { path = "../../adk-model", features = ["openai-ws"] }
adk-tool = { path = "../../adk-tool" }
async-openai = { version = "0.33", default-features = false, features = ["rustls", "responses"] }
tokio = { version = "1.40", features = ["full"] }
futures = "0.3"
serde_json = "1.0"
dotenvy = "0.15"
anyhow = "1.0"
