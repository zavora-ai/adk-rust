[package]
name = "mongodb-session-example"
version.workspace = true
edition.workspace = true
publish = false
description = "MongoDB session service example with Docker-managed database"

[[bin]]
name = "mongodb-session-example"
path = "src/main.rs"

[[bin]]
name = "mongodb-llm-chat"
path = "src/llm_chat.rs"

[dependencies]
adk-core.workspace = true
adk-agent.workspace = true
adk-model = { workspace = true, features = ["gemini"] }
adk-runner.workspace = true
adk-tool.workspace = true
adk-session = { workspace = true, features = ["mongodb"] }
tokio.workspace = true
serde_json.workspace = true
chrono.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
futures.workspace = true
dotenvy = "0.15"
