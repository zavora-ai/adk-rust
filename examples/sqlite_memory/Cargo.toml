[package]
name = "sqlite-memory-example"
version.workspace = true
edition.workspace = true
publish = false
description = "SQLite memory service example with FTS5 full-text search"

[[bin]]
name = "sqlite-memory-example"
path = "src/main.rs"

[[bin]]
name = "sqlite-memory-llm-chat"
path = "src/llm_chat.rs"

[dependencies]
adk-core.workspace = true
adk-agent.workspace = true
adk-model = { workspace = true, features = ["gemini"] }
adk-runner.workspace = true
adk-tool.workspace = true
adk-session.workspace = true
adk-memory = { workspace = true, features = ["sqlite-memory"] }
tokio.workspace = true
chrono.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
futures.workspace = true
serde_json.workspace = true
dotenvy = "0.15"
