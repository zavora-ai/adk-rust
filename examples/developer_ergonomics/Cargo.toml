[package]
name = "developer-ergonomics-example"
version = "0.0.1"
edition = "2024"
publish = false

[workspace]

[[bin]]
name = "validate"
path = "src/main.rs"

[[bin]]
name = "llm_demo"
path = "src/llm_demo.rs"

[dependencies]
adk-rust = { path = "../../adk-rust", features = ["standard"] }
adk-core = { path = "../../adk-core" }
adk-agent = { path = "../../adk-agent" }
adk-runner = { path = "../../adk-runner" }
adk-tool = { path = "../../adk-tool" }
adk-session = { path = "../../adk-session" }
adk-artifact = { path = "../../adk-artifact" }
async-trait = "0.1"
async-stream = "0.3"
anyhow = "1.0"
dotenvy = "0.15"
schemars = "0.8"
serde = { version = "1.0", features = ["derive"] }
tokio = { version = "1.40", features = ["full"] }
serde_json = "1.0"
futures = "0.3"
