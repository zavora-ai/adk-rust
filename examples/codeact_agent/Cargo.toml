[package]
name = "codeact-agent-example"
version = "0.0.1"
edition = "2024"
publish = false
description = "Runs the ADK-Rust CodeActAgent (CodeAct loop) against a self-contained line-script CodeRuntime"

[workspace]

[dependencies]
adk-core = { path = "../../adk-core" }
adk-agent = { path = "../../adk-agent", features = ["codeact"] }
adk-runner = { path = "../../adk-runner" }
adk-session = { path = "../../adk-session" }
tokio = { version = "1.40", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1.0"
futures = "0.3"
anyhow = "1.0"
async-trait = "0.1"
dotenvy = "0.15"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
