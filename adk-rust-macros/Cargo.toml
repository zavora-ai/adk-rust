[package]
name = "adk-rust-macros"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
description = "Proc macros for ADK-Rust — #[tool] attribute for zero-boilerplate tool registration"
repository = "https://github.com/zavora-ai/adk-rust"
documentation = "https://docs.rs/adk-macros"
keywords = ["adk", "agent", "macro", "tool", "ai"]
categories = ["development-tools::procedural-macro-helpers"]
readme = "README.md"

[lib]
proc-macro = true

[dependencies]
proc-macro2 = "1"
quote = "1"
syn = { version = "3", features = ["full", "extra-traits"] }

[dev-dependencies]
# Internal dev-deps are path-only (no version) so cargo strips them from the
# published manifest — they can never block or reorder a crates.io publish.
adk-core = { path = "../adk-core" }
async-trait.workspace = true
schemars = "1.0"
serde = { workspace = true }
serde_json.workspace = true
tokio = { workspace = true, features = ["rt", "macros"] }
