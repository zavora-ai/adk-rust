# =============================================================================
# ADK-Rust Cargo Configuration
# =============================================================================
# Platform-specific build optimizations for faster dev builds.
# These settings are automatically applied by Cargo.

[build]
# WHY INCREMENTAL = TRUE:
# While sccache is generally incompatible with Cargo's incremental compilation,
# 'wild' (a modern, concurrent linker) is being tested with incremental
# compilation support to optimize local developer iteration speed in this massive monorepo.
incremental = true

# ---------------------------------------------------------------------------
# Faster linker per platform
# ---------------------------------------------------------------------------
# We use 'clang' as the compiler driver because it supports advanced linkers 
# like 'mold' and 'wild' natively.
#
# Comparing 'mold' and 'wild' under 'clang' as linker:
# - `mold`: (-fuse-ld=mold) Mold is the general-purpose king of speed. It excels at linking
#   large binaries incredibly fast by parallelizing many traditionally sequential linking phases.
#   It's passed to clang by using `-fuse-ld=mold`, causing clang to invoke `ld.mold`.
# - `wild`: (--ld-path=wild) Wild is a specialized linker designed specifically for Rust workspaces
#   with massive monorepo structures. It aims for ultra-fast incremental rebuilds by minimizing
#   I/O and caching linking intermediate stages where possible. When combined with Cargo's
#   incremental compilation (`incremental = true`) and `WILD_INCREMENTAL="1"`, it dramatically
#   accelerates the dev cycle by only linking modified object code.
#   It's passed to clang explicitly via direct path overriding with `--ld-path=wild`.
#
# In this workspace, `wild` is the configured linker of choice alongside incremental compilation.

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = [
  "-C", "link-arg=--ld-path=wild"
]

[target.'cfg(all(target_os = "linux", any(target_arch = "x86_64", target_arch = "aarch64")))']
linker = "clang"
rustflags = [
  "-C", "link-arg=--ld-path=wild"
]

[target.aarch64-unknown-linux-gnu]
linker = "clang"
rustflags = [
  "-C", "link-arg=--ld-path=wild"
]

# macOS arm64 — the default ld is already fast; no override needed.
[target.aarch64-apple-darwin]
rustflags = []

# macOS x86 — the default ld is already fast; no override needed.
[target.x86_64-apple-darwin]
rustflags = []

# Windows MSVC — use rust-lld (ships with rustup)
[target.x86_64-pc-windows-msvc]
linker = "rust-lld"

# ---------------------------------------------------------------------------
# sccache — shared compilation cache
# ---------------------------------------------------------------------------
# sccache is managed by the devenv shell environment variables.

# ---------------------------------------------------------------------------
# Network & registry
# ---------------------------------------------------------------------------
[net]
git-fetch-with-cli = true

[registries.crates-io]
protocol = "sparse"

[env]
# Enable incremental support for the 'wild' linker specifically (if it supports it)
WILD_INCREMENTAL = "1"
# We do NOT set CARGO_INCREMENTAL = "0" here because sccache pre-commit 
# checks often require it to be UNSET completely rather than set to 0.
