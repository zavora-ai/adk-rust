name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  # cmake 4.x compat for audiopus
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"
  PROTOC: protoc

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive

    - name: Free disk space
      run: |
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /usr/share/dotnet
        df -h

    # 1. Install Nix with experimental features
    - uses: cachix/install-nix-action@v31
      with:
        extra_nix_config: |
          experimental-features = nix-command flakes
          trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= devenv.cachix.org-1:w1cLUi8dv3hnoSPGAuibQv+f9TZLr6cv/Hm9XgU50cw=
          substituters = https://cache.nixos.org https://devenv.cachix.org

    # 2. Use the 'devenv' cache
    - uses: cachix/cachix-action@v16
      with:
        name: devenv

    # 3. Install devenv CLI
    - name: Install devenv.sh
      run: nix profile add nixpkgs#devenv

    - name: Cache Cargo artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/sccache
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: devenv-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          devenv-${{ runner.os }}-cargo-

    - name: Check formatting
      run: |
        echo "🎨 Starting formatting check..."
        devenv shell ws-fmt

    - name: Run clippy
      run: |
        echo "🔍 Starting clippy lints..."
        devenv shell ws-clippy --message-format=json | tee clippy.json

    - name: Run tests
      run: |
        echo "🧪 Starting workspace tests..."
        devenv shell ws-test | tee test.log

    - name: Generate Summary
      if: always()
      run: |
        echo "📊 Generating CI summary..."
        devenv shell ws-summary
