name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"
  PROTOC: protoc

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Fast gate: formatting (< 30s) ──────────────────────────────
  fmt:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: cachix/install-nix-action@v30
      with:
        nix_path: nixpkgs=channel:nixos-unstable
    - uses: cachix/cachix-action@v17
      with:
        name: devenv
    - run: nix profile install nixpkgs#devenv
    - name: Check formatting
      run: CI=true devenv shell ws-fmt -- --check

  # ── Lint: clippy (parallel with test) ──────────────────────────
  clippy:
    needs: fmt
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Free disk space
      run: |
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /usr/share/dotnet

    - uses: cachix/install-nix-action@v30
      with:
        nix_path: nixpkgs=channel:nixos-unstable
    - uses: cachix/cachix-action@v17
      with:
        name: devenv
    - run: nix profile install nixpkgs#devenv

    - name: Cache cargo artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/sccache
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: clippy-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: clippy-${{ runner.os }}-

    - name: Run clippy
      run: CI=true devenv shell ws-clippy --message-format=json | tee clippy.json

    - name: Annotate clippy warnings
      if: always()
      run: |
        if [ -f clippy.json ]; then
          ERRORS=$(grep -c '"level":"error"' clippy.json || echo 0)
          WARNINGS=$(grep -c '"level":"warning"' clippy.json || echo 0)
          echo "### 🔍 Clippy: ${ERRORS} errors, ${WARNINGS} warnings" >> "$GITHUB_STEP_SUMMARY"
        fi

  # ── Test: nextest (parallel with clippy) ───────────────────────
  test:
    needs: fmt
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Free disk space
      run: |
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /usr/share/dotnet

    - uses: cachix/install-nix-action@v30
      with:
        nix_path: nixpkgs=channel:nixos-unstable
    - uses: cachix/cachix-action@v17
      with:
        name: devenv
    - run: nix profile install nixpkgs#devenv

    - name: Cache cargo artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/sccache
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: test-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: test-${{ runner.os }}-

    - name: Run tests
      run: CI=true devenv shell ws-test-ci | tee test.log

    - name: Test summary
      if: always()
      run: |
        if [ -f test.log ] && grep -q "tests run:" test.log; then
          SUMMARY=$(grep "tests run:" test.log | tail -1)
          echo "### 🧪 $SUMMARY" >> "$GITHUB_STEP_SUMMARY"
        fi

  # ── Cross-platform: macOS build + test ─────────────────────────
  macos:
    needs: fmt
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install stable Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-nextest
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-nextest

    - name: Install system dependencies
      run: brew install cmake protobuf

    - name: Cache cargo artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: macos-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: macos-${{ runner.os }}-

    - name: Build workspace
      run: cargo build --workspace

    - name: Run tests
      run: cargo nextest run --workspace

    - name: Test summary
      if: always()
      run: echo "### 🍎 macOS build + test passed" >> "$GITHUB_STEP_SUMMARY"

  # ── Cross-platform: Windows build + check ──────────────────────
  windows:
    needs: fmt
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install stable Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-nextest
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-nextest

    - name: Install cmake
      uses: lukka/get-cmake@latest

    - name: Install protoc
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Cache cargo artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~\.cargo\registry
          ~\.cargo\git
          target
        key: windows-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: windows-${{ runner.os }}-

    - name: Build workspace
      run: cargo build --workspace

    - name: Run tests
      run: cargo nextest run --workspace

    - name: Test summary
      if: always()
      run: echo "### 🪟 Windows build + test passed" >> $env:GITHUB_STEP_SUMMARY
