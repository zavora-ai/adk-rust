name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"
  PROTOC: protoc

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Fast gate: formatting (< 30s) ──────────────────────────────
  fmt:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: cachix/install-nix-action@v30
      with:
        nix_path: nixpkgs=channel:nixos-unstable
    - uses: cachix/cachix-action@v17
      with:
        name: devenv
    - run: nix profile install nixpkgs#devenv
    - name: Check formatting
      run: CI=true devenv shell ws-fmt -- --check

  # ── Lint: clippy (parallel with test) ──────────────────────────
  clippy:
    needs: fmt
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Free disk space
      run: |
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /usr/share/dotnet

    - uses: cachix/install-nix-action@v30
      with:
        nix_path: nixpkgs=channel:nixos-unstable
    - uses: cachix/cachix-action@v17
      with:
        name: devenv
    - run: nix profile install nixpkgs#devenv

    - name: Cache cargo artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/sccache
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: clippy-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: clippy-${{ runner.os }}-

    - name: Run clippy
      run: CI=true devenv shell ws-clippy --message-format=json | tee clippy.json

    - name: Annotate clippy warnings
      if: always()
      run: |
        if [ -f clippy.json ]; then
          ERRORS=$(grep -c '"level":"error"' clippy.json || echo 0)
          WARNINGS=$(grep -c '"level":"warning"' clippy.json || echo 0)
          echo "### 🔍 Clippy: ${ERRORS} errors, ${WARNINGS} warnings" >> "$GITHUB_STEP_SUMMARY"
        fi

  # ── Test: nextest (parallel with clippy) ───────────────────────
  test:
    needs: fmt
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Free disk space
      run: |
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /usr/share/dotnet

    - uses: cachix/install-nix-action@v30
      with:
        nix_path: nixpkgs=channel:nixos-unstable
    - uses: cachix/cachix-action@v17
      with:
        name: devenv
    - run: nix profile install nixpkgs#devenv

    - name: Cache cargo artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/sccache
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: test-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: test-${{ runner.os }}-

    - name: Run tests
      run: CI=true devenv shell ws-test-ci | tee test.log

    - name: Test summary
      if: always()
      run: |
        if [ -f test.log ] && grep -q "tests run:" test.log; then
          SUMMARY=$(grep "tests run:" test.log | tail -1)
          echo "### 🧪 $SUMMARY" >> "$GITHUB_STEP_SUMMARY"
        fi

  # ── Feature coverage: feature-gated modules default CI skips ───
  # Default clippy/test builds never compile feature-gated modules (e.g.
  # `adk-agent`'s `codeact`), so a regression there is invisible on the normal
  # PR path. This job compiles + tests each such module under its feature on a
  # plain runner via the shared setup-rust action (components + wild-linker
  # strip + cache come from there — no per-job setup drift).
  #
  # To cover another feature-gated module, add ONE line to the matrix below:
  #   - { package: <crate>, features: <feature> }
  feature-coverage:
    needs: fmt
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { package: adk-agent, features: codeact }
    steps:
    - uses: actions/checkout@v4

    # Toolchain (with clippy) + wild-linker strip + build cache from the shared
    # action. neutralize-wild defaults to true, correct for this plain runner.
    - name: Setup Rust
      uses: ./.github/actions/setup-rust
      with:
        components: clippy
        cache-key: feature-coverage-${{ matrix.package }}-${{ matrix.features }}

    - name: Install cargo-nextest
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-nextest

    - name: Clippy (${{ matrix.package }} --features ${{ matrix.features }})
      run: cargo clippy -p ${{ matrix.package }} --features ${{ matrix.features }} --all-targets -- -D warnings

    - name: Test (${{ matrix.package }} --features ${{ matrix.features }})
      run: cargo nextest run -p ${{ matrix.package }} --features ${{ matrix.features }}

  # ── Docs: documentation coverage for Stable-tier crates ──────
  docs:
    needs: fmt
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: cachix/install-nix-action@v30
      with:
        nix_path: nixpkgs=channel:nixos-unstable
    - uses: cachix/cachix-action@v17
      with:
        name: devenv
    - run: nix profile install nixpkgs#devenv

    - name: Cache cargo artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/sccache
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: docs-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: docs-${{ runner.os }}-

    - name: Check documentation coverage
      env:
        RUSTDOCFLAGS: "-D warnings"
      run: |
        echo "### 📚 Documentation Coverage" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        if CI=true devenv shell cargo doc --workspace --no-deps; then
          echo "✅ Workspace documentation built with no warnings" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "❌ Workspace documentation build failed (missing or broken docs)" >> "$GITHUB_STEP_SUMMARY"
          echo "::error::Documentation coverage check failed"
          exit 1
        fi

  # ── Scaffolds: cargo-adk generated projects compile ────────────
  templates:
    needs: fmt
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: cachix/install-nix-action@v30
      with:
        nix_path: nixpkgs=channel:nixos-unstable
    - uses: cachix/cachix-action@v17
      with:
        name: devenv
    - run: nix profile install nixpkgs#devenv

    - name: Cache cargo artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/sccache
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: templates-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: templates-${{ runner.os }}-

    - name: Check cargo-adk templates
      run: |
        CI=true devenv shell bash scripts/check-example-name-collisions.sh
        CI=true devenv shell bash scripts/check-doc-examples.sh
        # Doc rot guard: dependency-snippet versions in docs/READMEs/lib.rs must
        # match the workspace version, and every adk-rust feature named in docs
        # must exist in adk-rust/Cargo.toml (catches stale "0.8.2" snippets and
        # phantom features like the removed `labs`).
        CI=true devenv shell bash scripts/check-doc-versions.sh
        # Publish-order guard: publish.sh tiers must satisfy the workspace
        # dependency graph, including versioned dev-deps (what broke v1.0.0).
        CI=true devenv shell bash scripts/check-publish-order.sh
        # Scaffold every advertised template — including addon combos and
        # default-provider resolution — and cargo-check the generated projects.
        CI=true devenv shell bash scripts/check-cargo-adk-templates.sh

  # ── Cross-platform: macOS compile-only build ───────────────────
  # PR tier is compile-only; the full nextest run moves to the merge tier
  # (ci-merge.yml). setup-rust supplies the toolchain + build cache;
  # neutralize-wild is false because the wild-linker strip is Linux-only.
  macos:
    needs: fmt
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: ./.github/actions/setup-rust
      with:
        neutralize-wild: 'false'
        cache-key: macos

    - name: Install system dependencies
      run: brew install cmake protobuf

    - name: Build workspace
      run: cargo build --workspace

    - name: Build summary
      if: always()
      run: echo "### 🍎 macOS compile-only build passed" >> "$GITHUB_STEP_SUMMARY"

  # ── Cross-platform: Windows compile-only build ─────────────────
  # PR tier is compile-only; the full nextest run moves to the merge tier
  # (ci-merge.yml). setup-rust supplies the toolchain + build cache;
  # neutralize-wild is false because the wild-linker strip is Linux-only.
  windows:
    needs: fmt
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: ./.github/actions/setup-rust
      with:
        neutralize-wild: 'false'
        cache-key: windows

    - name: Install cmake
      uses: lukka/get-cmake@latest

    - name: Install protoc
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Build workspace
      run: cargo build --workspace

    - name: Build summary
      if: always()
      run: echo "### 🪟 Windows compile-only build passed" >> $env:GITHUB_STEP_SUMMARY
