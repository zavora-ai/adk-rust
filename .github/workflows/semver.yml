name: Semver Checks

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

concurrency:
  group: semver-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semver:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install stable Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-semver-checks
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-semver-checks

    - name: Cache cargo artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: semver-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: semver-${{ runner.os }}-

    # Strip Linux-only wild linker from .cargo/config.toml
    - name: Neutralize wild linker config
      run: |
        sed -i '/\[target\.x86_64-unknown-linux-gnu\]/,/^$/d' .cargo/config.toml
        sed -i '/\[target\.aarch64-unknown-linux-gnu\]/,/^$/d' .cargo/config.toml
        sed -i "/\[target\.'cfg(all(target_os/,/^$/d" .cargo/config.toml

    # Stable-tier leaf crates only (skip adk-rust umbrella — it just re-exports)
    - name: Semver checks — Stable crates (strict)
      run: |
        echo "### Stable-tier crates (fail on breakage)" >> "$GITHUB_STEP_SUMMARY"
        FAILED=0
        for crate in adk-core adk-agent adk-model adk-gemini adk-tool adk-runner adk-session; do
          echo "Checking $crate..."
          if cargo semver-checks check-release -p "$crate" --default-features; then
            echo "✅ $crate" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ $crate — BREAKING" >> "$GITHUB_STEP_SUMMARY"
            FAILED=1
          fi
        done
        if [ "$FAILED" -ne 0 ]; then
          echo "::error::Semver breakage detected in Stable-tier crates"
          exit 1
        fi

    - name: Semver checks — Beta/Experimental (warn only)
      run: |
        echo "### Beta/Experimental crates (warn only)" >> "$GITHUB_STEP_SUMMARY"
        for crate in adk-server adk-graph adk-memory adk-artifact adk-auth \
          adk-telemetry adk-guardrail adk-plugin adk-skill adk-anthropic \
          adk-cli adk-realtime adk-browser adk-eval adk-audio; do
          echo "Checking $crate..."
          if cargo semver-checks check-release -p "$crate" --default-features; then
            echo "✅ $crate" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ $crate — breaking (warn)" >> "$GITHUB_STEP_SUMMARY"
          fi
        done
