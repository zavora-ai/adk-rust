[package]
name = "adk-schema"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
description = "Canonical JSON Schema documents and validation for ADK"

[dependencies]
serde_json.workspace = true
thiserror.workspace = true
sha2.workspace = true
hex.workspace = true
schemars = { version = "1.2", optional = true }
jsonschema = { version = "0.47", optional = true, default-features = false }

[features]
default = []
schemars = ["dep:schemars"]
runtime-validation = ["dep:jsonschema"]
