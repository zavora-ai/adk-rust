[package]
name = "cargo-adk"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
description = "CLI scaffolding tool for ADK-Rust — generate agent projects from templates"
repository = "https://github.com/zavora-ai/adk-rust"
documentation = "https://docs.rs/cargo-adk"
keywords = ["adk", "agent", "scaffold", "cli", "ai"]
categories = ["development-tools", "command-line-utilities"]
readme = "README.md"

[[bin]]
name = "cargo-adk"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive", "env"] }
adk-deploy = { workspace = true }
adk-eval = { workspace = true, features = ["ci-helpers"] }
adk-bench = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
toml = { workspace = true }
sha2 = { workspace = true }
flate2 = { workspace = true }
tar = { workspace = true }
hex = { workspace = true }
syn = { version = "2", features = ["full", "parsing"] }
serde_yaml_ng = "0.10"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
proptest = "1.4"
