[package]
name = "adk-rust"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
description = "Rust Agent Development Kit - Build AI agents in Rust with modular components for models, tools, memory, and more."
homepage = "https://github.com/zavora-ai/adk-rust"
repository = "https://github.com/zavora-ai/adk-rust"
documentation = "https://docs.rs/adk-rust"
keywords = ["ai", "agent", "gemini", "llm", "adk"]
categories = ["api-bindings", "asynchronous", "web-programming"]
readme = "README.md"

[features]
default = ["standard"]

# Standard — everything needed to build, run, and test agents (~30s clean build)
standard = [
    "agents",
    "models",
    "gemini",
    "anthropic",
    "anthropic-client",
    "tools",
    "skills",
    "sessions",
    "artifacts",
    "memory",
    "runner",
    "server",
    "cli",
    "telemetry",
    "plugin",
    "guardrail",
    "auth",
]

# Full — standard + all stable specialist crates (~2min clean build)
full = [
    "standard",
    "graph",
    "realtime",
    "browser",
    "eval",
    "rag",
]

# Labs — standard + experimental crates (code, sandbox, audio)
labs = [
    "standard",
    "code",
    "sandbox",
    "audio",
]

# Minimal — just agents + Gemini + runner (fastest possible build)
minimal = ["agents", "gemini", "runner"]

# CLI launcher support
cli = ["dep:adk-cli", "runner", "server", "sessions", "telemetry"]

# Component features
agents = ["dep:adk-agent"]
models = ["dep:adk-model"]
tools = ["dep:adk-tool"]
skills = ["dep:adk-skill"]
sessions = ["dep:adk-session"]
artifacts = ["dep:adk-artifact"]
memory = ["dep:adk-memory"]
runner = ["dep:adk-runner"]
server = ["dep:adk-server"]
telemetry = ["dep:adk-telemetry"]
graph = ["dep:adk-graph"]
code = ["dep:adk-code"]
sandbox = ["dep:adk-sandbox"]
realtime = ["dep:adk-realtime"]
browser = ["dep:adk-browser"]
eval = ["dep:adk-eval"]
guardrail = ["dep:adk-guardrail"]
auth = ["dep:adk-auth"]
plugin = ["dep:adk-plugin"]
rag = ["dep:adk-rag"]
payments = ["dep:adk-payments"]

# Model provider features (forwarded to adk-model)
gemini = ["models", "adk-model/gemini"]
gemini-vertex = ["gemini", "adk-model/gemini-vertex"]
openai = ["models", "adk-model/openai"]
openrouter = ["models", "adk-model/openrouter"]
anthropic = ["models", "adk-model/anthropic"]
deepseek = ["models", "adk-model/deepseek"]
groq = ["models", "adk-model/groq"]
ollama = ["models", "adk-model/ollama"]
fireworks = ["models", "adk-model/fireworks"]
together = ["models", "adk-model/together"]
mistral = ["models", "adk-model/mistral"]
perplexity = ["models", "adk-model/perplexity"]
cerebras = ["models", "adk-model/cerebras"]
sambanova = ["models", "adk-model/sambanova"]
bedrock = ["models", "adk-model/bedrock"]
azure-ai = ["models", "adk-model/azure-ai"]

# Production backend features (forwarded to adk-session, adk-memory, adk-auth)
# These require external infrastructure (PostgreSQL, Redis, MongoDB, Firestore, Neo4j) and are NOT included in `full`
postgres-session = ["sessions", "adk-session/postgres"]
redis-session = ["sessions", "adk-session/redis"]
mongodb-session = ["sessions", "adk-session/mongodb"]
firestore-session = ["sessions", "adk-session/firestore"]
neo4j-session = ["sessions", "adk-session/neo4j"]
database-memory = ["memory", "adk-memory/database-memory"]
sqlite-memory = ["memory", "adk-memory/sqlite-memory"]
redis-memory = ["memory", "adk-memory/redis-memory"]
mongodb-memory = ["memory", "adk-memory/mongodb-memory"]
neo4j-memory = ["memory", "adk-memory/neo4j-memory"]
auth-bridge = ["auth", "server", "adk-auth/auth-bridge"]

# Realtime transport features (forwarded to adk-realtime)
vertex-live = ["realtime", "adk-realtime/vertex-live"]
livekit = ["realtime", "adk-realtime/livekit"]
openai-webrtc = ["realtime", "adk-realtime/openai-webrtc"]

# v0.7.0 competitive parity features (opt-in only, NOT included in standard or full)
# YAML agent config and hot reload (forwarded to adk-server)
yaml-agent = ["server", "adk-server/yaml-agent"]
# Agent Registry REST API (forwarded to adk-server)
agent-registry = ["server", "adk-server/agent-registry"]
# MCP sampling callback support (forwarded to adk-tool)
mcp-sampling = ["tools", "adk-tool/mcp-sampling"]
# Native Slack toolset (forwarded to adk-tool)
slack = ["tools", "adk-tool/slack"]
# Native BigQuery toolset (forwarded to adk-tool)
bigquery = ["tools", "adk-tool/bigquery"]
# Native Spanner toolset (forwarded to adk-tool)
spanner = ["tools", "adk-tool/spanner"]
# User personas for evaluation (forwarded to adk-eval)
personas = ["eval", "adk-eval/personas"]
# Prompt optimization CLI command (forwarded to adk-cli)
optimize = ["cli", "adk-cli/optimize"]
# Cloud secret manager providers (forwarded to adk-auth)
aws-secrets = ["auth", "adk-auth/aws-secrets"]
azure-keyvault = ["auth", "adk-auth/azure-keyvault"]
gcp-secrets = ["auth", "adk-auth/gcp-secrets"]
# Video avatar support for realtime sessions (forwarded to adk-realtime)
video-avatar = ["realtime", "adk-realtime/video-avatar"]

# Audio features (forwarded to adk-audio)
audio = ["dep:adk-audio"]
audio-tts = ["audio", "adk-audio/tts"]
audio-stt = ["audio", "adk-audio/stt"]
audio-fx = ["audio", "adk-audio/fx"]
audio-mlx = ["audio", "adk-audio/mlx"]
audio-onnx = ["audio", "adk-audio/onnx"]
audio-all = ["audio", "adk-audio/all"]

# Anthropic client crate (direct access to adk-anthropic types)
anthropic-client = ["dep:adk-anthropic"]

# Action node features (forwarded to adk-graph)
action = ["graph", "dep:adk-action", "adk-graph/action"]
action-http = ["action", "adk-graph/action-http"]
action-trigger = ["action", "adk-graph/action-trigger"]
action-db = ["action", "adk-graph/action-db"]
action-code = ["action", "adk-graph/action-code"]
action-email = ["action", "adk-graph/action-email"]
action-rss = ["action", "adk-graph/action-rss"]
action-full = ["action", "adk-graph/action-full"]

# ONNX audio model features (forwarded to adk-audio)
whisper-onnx = ["audio", "adk-audio/whisper-onnx"]
distil-whisper = ["audio", "adk-audio/distil-whisper"]
moonshine = ["audio", "adk-audio/moonshine"]
qwen3-tts = ["audio", "adk-audio/qwen3-tts"]
all-onnx = ["audio", "adk-audio/all-onnx"]
kokoro = ["audio", "adk-audio/kokoro"]
chatterbox = ["audio", "adk-audio/chatterbox"]

[dependencies]
# Core is always included
adk-core.workspace = true

# Optional components
adk-agent = { workspace = true, optional = true }
adk-model = { workspace = true, optional = true }
adk-tool = { workspace = true, optional = true }
adk-skill = { workspace = true, optional = true }
adk-session = { workspace = true, optional = true }
adk-artifact = { workspace = true, optional = true }
adk-memory = { workspace = true, optional = true }
adk-runner = { workspace = true, optional = true }
adk-server = { workspace = true, optional = true }
adk-telemetry = { workspace = true, optional = true }
adk-cli = { workspace = true, optional = true }
adk-graph = { workspace = true, optional = true }
adk-code = { workspace = true, optional = true }
adk-sandbox = { workspace = true, optional = true }
adk-realtime = { workspace = true, optional = true }
adk-browser = { workspace = true, optional = true }
adk-eval = { workspace = true, optional = true }
adk-guardrail = { workspace = true, optional = true }
adk-auth = { workspace = true, optional = true }
adk-plugin = { workspace = true, optional = true }
adk-rag = { workspace = true, optional = true }
adk-payments = { workspace = true, optional = true }
adk-audio = { workspace = true, optional = true }
adk-action = { workspace = true, optional = true }
adk-anthropic = { workspace = true, optional = true }

# Re-export common dependencies
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "sync", "time", "macros", "net", "signal", "fs", "process", "io-util"] }
async-trait = { workspace = true }
futures = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "sync", "time", "macros", "net", "signal", "fs", "process", "io-util", "test-util"] }

[package.metadata.docs.rs]
# Use "full" instead of all-features to avoid C library deps (espeak, cmake)
# that don't build in docs.rs sandboxed environment.
features = ["full", "payments"]
rustdoc-args = ["--cfg", "docsrs"]
