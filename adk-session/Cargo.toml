[package]
name = "adk-session"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
description = "Session management and state persistence for Rust Agent Development Kit (ADK-Rust) agents"
repository = "https://github.com/zavora-ai/adk-rust"
documentation = "https://docs.rs/adk-session"
keywords = ["ai", "agent", "adk", "session", "state"]
categories = ["api-bindings", "asynchronous"]
readme = "README.md"

[dependencies]
adk-core.workspace = true
async-trait.workspace = true
serde.workspace = true
serde_json.workspace = true
chrono.workspace = true
tracing.workspace = true
uuid.workspace = true
reqwest = { workspace = true, optional = true }
google-cloud-auth = { version = "1.8", optional = true, default-features = false, features = ["default-rustls-provider"] }
sqlx = { version = "0.8", features = ["runtime-tokio", "chrono", "json"], optional = true }
fred = { version = "10", optional = true }
mongodb = { version = "3", optional = true }
firestore = { version = "0.48", optional = true }
neo4rs = { version = "0.8", optional = true }
aes-gcm = { version = "0.10", optional = true }
rand = { version = "0.9", optional = true }
base64 = { version = "0.22", optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "macros"] }
axum = "0.8"
proptest = "1.5"

[features]
default = []
sqlite = ["sqlx/sqlite"]
database = ["sqlite"]
postgres = ["sqlx/postgres"]
redis = ["fred"]
mongodb = ["dep:mongodb"]
firestore = ["dep:firestore"]
neo4j = ["dep:neo4rs"]
vertex-session = ["google-cloud-auth", "reqwest"]
encrypted-session = ["aes-gcm", "rand", "base64"]
